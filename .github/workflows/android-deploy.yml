name: Android Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - github-release
          - play-store
          - both

jobs:
  build-release:
    name: Build Release APKs
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Install NDK
      run: |
        echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
    
    - name: Install CMake
      run: |
        echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.22.1"
    
    - name: Create keystore.properties
      run: |
        echo "keystore=release.keystore" > keystore.properties
        echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
        echo "key.alias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
        echo "key.password=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
    
    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android-app/release.keystore
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build release APKs
      run: ./gradlew :android-app:assembleRelease
    
    - name: Sign APKs
      run: |
        # APKs are already signed during build if keystore is configured
        echo "APKs signed during build process"
    
    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: |
          android-app/build/outputs/apk/release/*.apk
          android-app/build/outputs/mapping/release/

  deploy-github:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-release
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.deploy_target == 'github-release' ||
      github.event.inputs.deploy_target == 'both'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-apks
        path: release-artifacts
    
    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=v$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release Notes
      run: |
        cat > release_notes.md << 'EOF'
        ## LSP Android Port ${{ steps.get_version.outputs.VERSION }}
        
        ### What's New
        - Professional audio processing on Android
        - LSP plugins integration
        - Real-time audio effects
        
        ### APK Variants
        - **arm64-v8a**: For modern 64-bit ARM devices (recommended)
        - **armeabi-v7a**: For older 32-bit ARM devices
        - **x86_64**: For emulators and x86 devices
        
        ### Installation
        1. Download the APK for your device architecture
        2. Enable "Install from Unknown Sources" in Android settings
        3. Install the APK
        
        ### Requirements
        - Android 8.0 (API 26) or higher
        - Audio device with low-latency support recommended
        
        EOF
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          release-artifacts/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-play-store:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    needs: build-release
    if: |
      github.event.inputs.deploy_target == 'play-store' ||
      github.event.inputs.deploy_target == 'both'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-apks
        path: release-artifacts
    
    - name: Setup Google Play credentials
      run: |
        echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" > service-account.json
    
    - name: Upload to Play Store (Internal Testing)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJson: service-account.json
        packageName: com.example.lspandroid
        releaseFiles: release-artifacts/apk/release/*.apk
        track: internal
        status: completed
        whatsNewDirectory: whatsnew/
        mappingFile: release-artifacts/mapping/release/mapping.txt
      if: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON != '' }}

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-github, deploy-play-store]
    if: always()
    
    steps:
    - name: Deployment Summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- GitHub Release: ${{ needs.deploy-github.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Play Store: ${{ needs.deploy-play-store.result }}" >> $GITHUB_STEP_SUMMARY
